<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Tracker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <!-- SETUP VIEW -->
      <section id="setup-view" class="view">
        <header class="header">
          <div class="logo-dot"></div>
          <h1>Focus Tracker</h1>
        </header>

        <div class="field">
          <label>Duration</label>
          <div class="preset-row">
            <button type="button" class="preset-btn" data-minutes="15">15m</button>
            <button type="button" class="preset-btn" data-minutes="25">25m</button>
            <button type="button" class="preset-btn" data-minutes="45">45m</button>
            <button type="button" class="preset-btn" data-minutes="60">60m</button>
          </div>
          <input
            type="number"
            id="custom-minutes"
            min="1"
            placeholder="Custom minutes"
          />
        </div>

        <div class="field">
          <label>Lock mode</label>
          <div class="lock-toggle">
            <button type="button" class="lock-card selected" id="lock-soft" data-mode="soft">
              <span class="lock-title">Soft Lock</span>
              <span class="lock-desc">Shows a 5-second warning, then lets you stay.</span>
            </button>
            <button type="button" class="lock-card" id="lock-hard" data-mode="hard">
              <span class="lock-title">Hard Lock</span>
              <span class="lock-desc">Instantly redirects you back, no warning.</span>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="whitelist">Websites</label>
          <textarea
            id="whitelist"
            rows="3"
            placeholder="github.com&#10;docs.google.com&#10;stackoverflow.com"
          ></textarea>
          <span class="hint">One domain or URL substring per line.</span>
        </div>

        <button type="button" id="start-btn" class="primary-btn">
          Start Focus Session
        </button>

        <button type="button" id="review-additions-btn" class="ghost-btn review-additions-btn hidden">
          Add sites from last session
        </button>
      </section>

      <!-- ACTIVE SESSION VIEW -->
      <section id="active-view" class="view hidden">
        <header class="header">
          <div class="logo-dot"></div>
          <h1>Focus Tracker</h1>
        </header>

        <div class="countdown" id="countdown">00:00</div>

        <div class="badge-row">
          <div class="lock-mode-badge" id="lock-mode-badge">Soft Lock</div>
          <div class="lock-mode-badge paused-badge hidden" id="paused-badge">Paused</div>
        </div>

        <div class="event-source-row hidden" id="event-source-row">
          <span class="event-source-icon">📅</span>
          <span class="event-source-title" id="event-source-title"></span>
        </div>

        <div class="browser-only-row hidden" id="browser-only-row">
          <span class="browser-only-icon">⚠️</span>
          <span>Browser-only session — desktop app unreachable, no sync.</span>
        </div>

        <button type="button" id="pause-btn" class="secondary-btn pause-btn">
          Pause Timer
        </button>

        <div class="violations-row">
          <span class="violations-count" id="violations-count">0 violations</span>
          <button type="button" id="view-log-btn" class="ghost-btn">View Full Log</button>
        </div>

        <div class="field">
          <label>Allowed sites</label>
          <ul class="allowed-sites" id="allowed-sites"></ul>
        </div>

        <div class="field">
          <label for="add-site-input">Add a site</label>
          <div class="add-site-row">
            <input type="text" id="add-site-input" placeholder="e.g. wikipedia.org" />
            <button type="button" id="add-site-btn" class="secondary-btn">Add</button>
          </div>
          <div id="add-site-reason-row" class="hidden">
            <textarea
              id="add-site-reason"
              rows="2"
              placeholder="Why do you need this site right now?"
            ></textarea>
            <div class="add-site-actions">
              <button type="button" id="add-site-cancel-btn" class="ghost-btn">
                Cancel
              </button>
              <button type="button" id="add-site-submit-btn" class="secondary-btn">
                Submit reason
              </button>
            </div>
          </div>
          <span class="hint" id="add-site-status"></span>
        </div>

        <button type="button" id="nuclear-btn" class="nuclear-btn">
          Nuclear — End Session Now
        </button>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
